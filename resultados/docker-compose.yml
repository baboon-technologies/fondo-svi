version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
      - PORT=5173
      - HOSTNAME=0.0.0.0
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - svi-network

networks:
  svi-network:
    driver: bridge
