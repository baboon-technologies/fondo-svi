<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVI - Open Graph Image</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 1200px;
            height: 630px;
            overflow: hidden;
        }
        .og-container {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #012878 0%, #0052CC 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }
        .logo-img {
            max-width: 400px;
            max-height: 200px;
            filter: brightness(0) invert(1);
        }
        .tagline {
            color: rgba(255, 255, 255, 0.95);
            font-size: 36px;
            font-weight: 600;
            text-align: center;
            max-width: 900px;
            line-height: 1.4;
        }
        .accent-line {
            width: 120px;
            height: 5px;
            background: white;
            margin: 25px 0;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="og-container">
        <div class="logo-container">
            <img src="Logo.png" alt="SVI Logo" class="logo-img">
        </div>
        <div class="accent-line"></div>
        <div class="tagline">SYSTEMATIC VALUE INVESTING</div>
    </div>
</body>
</html>
